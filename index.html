<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Supabase Chat</title>
    <!-- Tailwind CSS for Telegram-like UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Custom scrollbar for chat messages area */
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
        .scrollbar-hidden { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

<!-- Main Container -->
<div id="app" class="flex h-screen max-w-6xl mx-auto bg-gray-800 shadow-2xl overflow-hidden">
    
    <!-- LEFT SIDEBAR: Chat List & Contacts -->
    <div id="sidebar" class="w-1/3 bg-gray-850 border-r border-gray-700 flex flex-col">
        <!-- Header: User Info & Logout -->
        <div class="p-4 bg-gray-800 border-b border-gray-700 flex items-center justify-between">
            <div>
                <h2 class="font-bold text-lg" id="user-nickname-display">Chats</h2>
                <span id="user-id-display" class="text-xs text-gray-400"></span>
            </div>
            <button id="logout-btn" class="text-sm bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded transition hidden">Выйти</button>
        </div>

        <!-- Add Chat Form -->
        <div class="p-3 border-b border-gray-700">
            <form id="add-chat-form" class="flex space-x-2">
                <input type="text" id="new-chat-input" placeholder="Введите ник или ID друга" class="flex-1 bg-gray-700 text-sm text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-sm px-4 py-2 rounded transition">+ Добавить</button>
            </form>
        </div>

        <!-- Chat List -->
        <div id="chat-list-container" class="flex-1 overflow-y-auto scrollbar-hidden p-2">
            <div id="chat-list" class="space-y-1">
                <!-- Dynamically populated chats -->
                <div class="text-center text-gray-500 py-10">Загрузка чатов...</div>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE: Main Chat Area -->
    <div id="chat-area" class="w-2/3 flex flex-col bg-gray-800">
        <!-- Placeholder when no chat is selected -->
        <div id="no-chat-selected" class="flex-1 flex items-center justify-center text-gray-500">
            <p>Выберите чат или добавьте друга, чтобы начать общение</p>
        </div>

        <!-- Active Chat View -->
        <div id="active-chat-view" class="flex-1 flex flex-col h-full hidden">
            <!-- Chat Header -->
            <div class="p-4 bg-gray-800 border-b border-gray-700 flex items-center">
                <div>
                    <h3 id="active-chat-name" class="font-bold text-lg"></h3>
                    <span id="active-chat-id-display" class="text-xs text-gray-400"></span>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Messages will appear here -->
            </div>

            <!-- Message Input Form -->
            <div class="p-4 bg-gray-800 border-t border-gray-700">
                <form id="send-message-form" class="flex space-x-2">
                    <input type="text" id="message-input" placeholder="Введите сообщение..." class="flex-1 bg-gray-700 text-white px-4 py-3 rounded-full border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" autocomplete="off">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-full transition">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- AUTH MODAL (Login / Register) -->
<div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
    <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-md p-6">
        <h2 id="auth-modal-title" class="text-2xl font-bold mb-6 text-center">Вход / Регистрация</h2>
        
        <!-- Error / Debug Console -->
        <div id="auth-error" class="mb-4 bg-red-900/50 border border-red-700 rounded p-3 text-sm overflow-auto max-h-40"></div>
        
        <form id="auth-form" class="space-y-4">
            <div>
                <label for="auth-nickname" class="block text-sm font-medium text-gray-300 mb-1">Никнейм</label>
                <input type="text" id="auth-nickname" name="nickname" required minlength="3" maxlength="20" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-400 mt-1">От 3 до 20 символов, уникальный</p>
            </div>
            <div>
                <label for="auth-password" class="block text-sm font-medium text-gray-300 mb-1">Пароль</label>
                <input type="password" id="auth-password" name="password" required minlength="6" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-400 mt-1">Минимум 6 символов</p>
            </div>
            <div class="flex justify-between items-center pt-2">
                <button type="button" id="switch-auth-mode" class="text-blue-400 hover:text-blue-300 text-sm">↻ Войти</button>
                <button type="submit" id="auth-submit-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded transition">Зарегистрироваться</button>
            </div>
        </form>
    </div>
</div>

<!-- DEBUG CONSOLE (Visible at bottom) -->
<div id="debug-console" class="fixed bottom-0 left-0 right-0 bg-black bg-opacity-80 text-green-400 p-2 text-xs font-mono h-32 overflow-y-auto border-t border-gray-700" style="display: none;">
    <div class="flex justify-between items-center mb-1">
        <span class="font-bold">🐞 Debug Console</span>
        <button id="clear-debug-btn" class="text-gray-400 hover:text-white px-2 py-0.5 text-xs bg-gray-700 rounded">Clear</button>
    </div>
    <div id="debug-content"></div>
</div>

<script>
    (function(){
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://my-proxy-chat.wodaphone1337.workers.dev/';
        const SUPABASE_ANON_KEY = 'sb_publishable_MP_XcGnCETIZB-2p6S4gHw_9L4PQCw0';
        
        // --- INITIALIZATION ---
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // --- GLOBAL STATE ---
        let currentUser = null;
        let currentProfile = null;
        let activeChat = null;
        let chatsList = [];
        let messageSubscription = null;
        let isLoginMode = false; // false = register, true = login
        
        // --- DOM ELEMENTS ---
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const authErrorDiv = document.getElementById('auth-error');
        const authTitle = document.getElementById('auth-modal-title');
        const switchAuthBtn = document.getElementById('switch-auth-mode');
        const submitBtn = document.getElementById('auth-submit-btn');
        const nicknameInput = document.getElementById('auth-nickname');
        const passwordInput = document.getElementById('auth-password');
        const appDiv = document.getElementById('app');
        const logoutBtn = document.getElementById('logout-btn');
        const userNicknameDisplay = document.getElementById('user-nickname-display');
        const userIdDisplay = document.getElementById('user-id-display');
        const chatListDiv = document.getElementById('chat-list');
        const noChatSelectedDiv = document.getElementById('no-chat-selected');
        const activeChatView = document.getElementById('active-chat-view');
        const activeChatName = document.getElementById('active-chat-name');
        const activeChatIdDisplay = document.getElementById('active-chat-id-display');
        const messagesContainer = document.getElementById('messages-container');
        const sendMessageForm = document.getElementById('send-message-form');
        const messageInput = document.getElementById('message-input');
        const addChatForm = document.getElementById('add-chat-form');
        const newChatInput = document.getElementById('new-chat-input');
        
        // Debug Console
        const debugConsole = document.getElementById('debug-console');
        const debugContent = document.getElementById('debug-content');
        const clearDebugBtn = document.getElementById('clear-debug-btn');
        
        // --- DEBUG FUNCTIONS ---
        function logToDebug(message, type = 'info') {
            console.log(message);
            if (!debugContent) return;
            
            const entry = document.createElement('div');
            entry.className = `mb-1 ${type === 'error' ? 'text-red-400' : 'text-green-400'}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugContent.appendChild(entry);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            
            // Keep only last 50 entries to avoid DOM bloat
            if (debugContent.children.length > 50) {
                debugContent.removeChild(debugContent.children[0]);
            }
        }
        
        function clearDebug() {
            if (debugContent) debugContent.innerHTML = '';
        }
        
        // Show/hide debug console (always show for now)
        debugConsole.style.display = 'block';
        
        // --- UTILITY FUNCTIONS ---
        function displayError(context, error) {
            console.error(context, error);
            const errorMsg = error?.message || error?.error_description || JSON.stringify(error);
            authErrorDiv.textContent = `${context}: ${errorMsg}`;
            authErrorDiv.classList.remove('hidden');
            logToDebug(`ERROR ${context}: ${errorMsg}`, 'error');
        }
        
        function clearAuthError() {
            authErrorDiv.textContent = '';
            authErrorDiv.classList.add('hidden');
        }
        
        // --- AUTHENTICATION ---
        async function checkSession() {
            logToDebug('Checking existing session...');
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;
                
                if (session?.user) {
                    logToDebug(`Session found for user: ${session.user.id}`);
                    currentUser = session.user;
                    await loadProfile(currentUser.id);
                    showApp();
                } else {
                    logToDebug('No active session');
                    showAuthModal();
                }
            } catch (e) {
                displayError('Session check failed', e);
                showAuthModal();
            }
        }
        
        async function loadProfile(userId) {
            logToDebug(`Loading profile for ${userId}`);
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();
                    
                if (error) throw error;
                currentProfile = data;
                userNicknameDisplay.textContent = currentProfile.nickname;
                userIdDisplay.textContent = `ID: ${currentProfile.id}`;
                logToDebug(`Profile loaded: ${currentProfile.nickname} (${currentProfile.id})`);
            } catch (e) {
                displayError('Failed to load profile', e);
                // If profile missing, maybe sign out
                await supabase.auth.signOut();
                showAuthModal();
            }
        }
        
        function showAuthModal() {
            authModal.classList.remove('hidden');
            appDiv.classList.add('hidden');
            logoutBtn.classList.add('hidden');
            clearAuthError();
        }
        
        function showApp() {
            authModal.classList.add('hidden');
            appDiv.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            loadChats();
        }
        
        // Switch between Login / Register
        switchAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.textContent = 'Вход';
                submitBtn.textContent = 'Войти';
                switchAuthBtn.textContent = '↻ Регистрация';
            } else {
                authTitle.textContent = 'Регистрация';
                submitBtn.textContent = 'Зарегистрироваться';
                switchAuthBtn.textContent = '↻ Войти';
            }
            clearAuthError();
        });
        
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAuthError();
            
            const nickname = nicknameInput.value.trim();
            const password = passwordInput.value;
            
            if (!nickname || !password) {
                displayError('Validation', 'Никнейм и пароль обязательны');
                return;
            }
            
            logToDebug(`${isLoginMode ? 'Logging in' : 'Registering'} user: ${nickname}`);
            
            try {
                if (isLoginMode) {
                    // LOGIN: First find user by nickname, then sign in
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('id')
                        .eq('nickname', nickname)
                        .single();
                        
                    if (profileError) {
                        displayError('Login Error', 'Пользователь с таким ником не найден');
                        return;
                    }
                    
                    // Supabase Auth doesn't support login by nickname directly,
                    // we need email. But we created user without email. 
                    // Workaround: Use the ID as email? No, Supabase uses email for signIn.
                    // Since we used signUp without email, we need a different approach.
                    // For simplicity, we'll use a custom sign-in method. 
                    // Actually, Supabase can sign in with phone or email. 
                    // But we have neither. Let's create a stored procedure or use admin API.
                    // Better: Use signIn with password and a dummy email derived from nickname.
                    // This is a hack but works for demo.
                    const email = `${nickname}@temp.mail`;
                    
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    currentUser = data.user;
                    logToDebug(`User logged in: ${currentUser.id}`);
                    await loadProfile(currentUser.id);
                    showApp();
                    
                } else {
                    // REGISTER: Generate a dummy email from nickname
                    const email = `${nickname}@temp.mail`;
                    
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: { nickname: nickname },
                            emailRedirectTo: window.location.origin
                        }
                    });
                    
                    if (error) throw error;
                    
                    if (data.user) {
                        logToDebug(`User registered: ${data.user.id}`);
                        // Profile should be created by DB trigger
                        // Wait a bit for trigger
                        await new Promise(resolve => setTimeout(resolve, 500));
                        
                        // Auto login after registration
                        const { error: loginError } = await supabase.auth.signInWithPassword({
                            email: email,
                            password: password
                        });
                        if (loginError) throw loginError;
                        
                        currentUser = data.user;
                        await loadProfile(data.user.id);
                        showApp();
                    }
                }
            } catch (e) {
                displayError('Auth Error', e);
            }
        });
        
        logoutBtn.addEventListener('click', async () => {
            logToDebug('Logging out...');
            await supabase.auth.signOut();
            currentUser = null;
            currentProfile = null;
            activeChat = null;
            if (messageSubscription) {
                messageSubscription.unsubscribe();
                messageSubscription = null;
            }
            showAuthModal();
        });
        
        // --- CHATS MANAGEMENT ---
        async function loadChats() {
            if (!currentUser) return;
            
            logToDebug('Loading chats...');
            try {
                // Get chats where current user is participant
                const { data, error } = await supabase
                    .from('chats')
                    .select(`
                        id,
                        user1_id,
                        user2_id,
                        created_at,
                        user1:profiles!chats_user1_id_fkey(nickname),
                        user2:profiles!chats_user2_id_fkey(nickname)
                    `)
                    .or(`user1_id.eq.${currentUser.id},user2_id.eq.${currentUser.id}`)
                    .order('created_at', { ascending: false });
                    
                if (error) throw error;
                
                chatsList = data || [];
                logToDebug(`Loaded ${chatsList.length} chats`);
                renderChatList();
            } catch (e) {
                displayError('Failed to load chats', e);
            }
        }
        
        function renderChatList() {
            if (!chatListDiv) return;
            
            if (chatsList.length === 0) {
                chatListDiv.innerHTML = '<div class="text-center text-gray-500 py-10">Нет чатов. Добавьте друга 👆</div>';
                return;
            }
            
            let html = '';
            chatsList.forEach(chat => {
                const otherUserId = chat.user1_id === currentUser.id ? chat.user2_id : chat.user1_id;
                const otherUserNickname = chat.user1_id === currentUser.id 
                    ? chat.user2.nickname 
                    : chat.user1.nickname;
                    
                html += `
                    <div class="chat-item p-3 rounded-lg cursor-pointer transition 
                                ${activeChat?.id === chat.id ? 'bg-blue-700' : 'bg-gray-750 hover:bg-gray-700'}"
                         data-chat-id="${chat.id}"
                         data-other-user-id="${otherUserId}"
                         data-other-user-nickname="${otherUserNickname}">
                        <div class="font-medium">${otherUserNickname}</div>
                        <div class="text-xs text-gray-400">Chat ID: ${chat.id}</div>
                    </div>
                `;
            });
            
            chatListDiv.innerHTML = html;
            
            // Attach click listeners
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', () => {
                    const chatId = parseInt(el.dataset.chatId);
                    const otherUserId = el.dataset.otherUserId;
                    const otherUserNickname = el.dataset.otherUserNickname;
                    selectChat(chatId, otherUserId, otherUserNickname);
                });
            });
        }
        
        async function createChat(targetNickname) {
            logToDebug(`Attempting to create chat with: ${targetNickname}`);
            try {
                // 1. Find target user by nickname or ID
                let targetProfile = null;
                
                // Check if input looks like UUID
                const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
                if (uuidRegex.test(targetNickname)) {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', targetNickname)
                        .single();
                    if (error) throw new Error('Пользователь с таким ID не найден');
                    targetProfile = data;
                } else {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('nickname', targetNickname)
                        .single();
                    if (error) throw new Error('Пользователь с таким ником не найден');
                    targetProfile = data;
                }
                
                if (targetProfile.id === currentUser.id) {
                    throw new Error('Нельзя создать чат с самим собой');
                }
                
                logToDebug(`Found target user: ${targetProfile.nickname} (${targetProfile.id})`);
                
                // 2. Check if chat already exists
                const user1 = currentUser.id < targetProfile.id ? currentUser.id : targetProfile.id;
                const user2 = currentUser.id < targetProfile.id ? targetProfile.id : currentUser.id;
                
                const { data: existingChat, error: checkError } = await supabase
                    .from('chats')
                    .select('id')
                    .eq('user1_id', user1)
                    .eq('user2_id', user2)
                    .maybeSingle();
                    
                if (checkError) throw checkError;
                
                if (existingChat) {
                    logToDebug(`Chat already exists: ${existingChat.id}`);
                    // Refresh chats and select this one
                    await loadChats();
                    selectChat(existingChat.id, targetProfile.id, targetProfile.nickname);
                    return;
                }
                
                // 3. Create new chat
                const { data: newChat, error: insertError } = await supabase
                    .from('chats')
                    .insert({
                        user1_id: user1,
                        user2_id: user2
                    })
                    .select()
                    .single();
                    
                if (insertError) throw insertError;
                
                logToDebug(`Chat created: ${newChat.id}`);
                await loadChats();
                selectChat(newChat.id, targetProfile.id, targetProfile.nickname);
                newChatInput.value = '';
                
            } catch (e) {
                displayError('Create Chat Error', e);
            }
        }
        
        addChatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const target = newChatInput.value.trim();
            if (target) {
                createChat(target);
            }
        });
        
        // --- CHAT SELECTION & MESSAGES ---
        async function selectChat(chatId, otherUserId, otherUserNickname) {
            logToDebug(`Selecting chat: ${chatId} with ${otherUserNickname}`);
            
            activeChat = { id: chatId, otherUserId, otherUserNickname };
            
            // Update UI
            activeChatName.textContent = otherUserNickname;
            activeChatIdDisplay.textContent = `Chat ID: ${chatId}`;
            noChatSelectedDiv.classList.add('hidden');
            activeChatView.classList.remove('hidden');
            
            // Highlight selected chat
            renderChatList();
            
            // Load messages
            await loadMessages(chatId);
            
            // Subscribe to new messages
            subscribeToMessages(chatId);
            
            // Focus input
            messageInput.focus();
        }
        
        async function loadMessages(chatId) {
            logToDebug(`Loading messages for chat ${chatId}`);
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select(`
                        id,
                        content,
                        created_at,
                        sender_id,
                        sender:profiles!messages_sender_id_fkey(nickname)
                    `)
                    .eq('chat_id', chatId)
                    .order('created_at', { ascending: true });
                    
                if (error) throw error;
                
                logToDebug(`Loaded ${data.length} messages`);
                renderMessages(data);
                
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (e) {
                displayError('Failed to load messages', e);
            }
        }
        
        function renderMessages(messages) {
            if (!messagesContainer) return;
            
            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div class="text-center text-gray-500 py-10">Нет сообщений. Напишите первое сообщение 👇</div>';
                return;
            }
            
            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.sender_id === currentUser.id;
                const senderName = msg.sender.nickname;
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                html += `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[75%]">
                            <div class="text-xs text-gray-400 mb-1 ${isOwn ? 'text-right' : ''}">${senderName} • ${time}</div>
                            <div class="rounded-2xl px-4 py-2 ${isOwn ? 'bg-blue-600' : 'bg-gray-700'}">
                                ${escapeHtml(msg.content)}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            messagesContainer.innerHTML = html;
        }
        
        // Simple escape function
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function subscribeToMessages(chatId) {
            // Unsubscribe from previous subscription
            if (messageSubscription) {
                messageSubscription.unsubscribe();
                messageSubscription = null;
            }
            
            logToDebug(`Subscribing to messages for chat ${chatId}`);
            
            messageSubscription = supabase
                .channel(`chat-${chatId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `chat_id=eq.${chatId}`
                }, (payload) => {
                    logToDebug(`New message received in chat ${chatId}`);
                    // Reload messages to include the new one
                    loadMessages(chatId);
                })
                .subscribe((status) => {
                    logToDebug(`Subscription status for chat ${chatId}: ${status}`);
                    if (status === 'SUBSCRIBED') {
                        logToDebug('Successfully subscribed to realtime messages');
                    }
                });
        }
        
        sendMessageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!activeChat) return;
            
            const content = messageInput.value.trim();
            if (!content) return;
            
            logToDebug(`Sending message to chat ${activeChat.id}`);
            
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .insert({
                        chat_id: activeChat.id,
                        sender_id: currentUser.id,
                        content: content
                    })
                    .select();
                    
                if (error) throw error;
                
                logToDebug('Message sent successfully');
                messageInput.value = '';
                
                // Optimistic UI update
                await loadMessages(activeChat.id);
                
            } catch (e) {
                displayError('Send Message Error', e);
            }
        });
        
        // --- INITIALIZATION ---
        checkSession();
        
        // Debug clear button
        clearDebugBtn.addEventListener('click', clearDebug);
        
        // Expose some for debugging
        window.debug = { supabase, logToDebug, state: () => ({ currentUser, currentProfile, activeChat, chatsList }) };
        
        logToDebug('Application initialized. Ready.');
    })();
</script>
