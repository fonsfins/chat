<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Supabase Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
        .scrollbar-hidden { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

<!-- Loading overlay (глобальная загрузка) -->
<div id="global-loader" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-800 rounded-lg p-6 flex items-center space-x-3">
        <svg class="animate-spin h-6 w-6 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Загрузка...</span>
    </div>
</div>

<!-- Основной интерфейс -->
<div id="app" class="flex h-screen max-w-6xl mx-auto bg-gray-800 shadow-2xl overflow-hidden">
    <!-- Сайдбар (чаты) -->
    <div id="sidebar" class="w-1/3 bg-gray-850 border-r border-gray-700 flex flex-col">
        <div class="p-4 bg-gray-800 border-b border-gray-700 flex items-center justify-between">
            <div>
                <h2 class="font-bold text-lg" id="user-nickname-display">Чаты</h2>
                <span id="user-id-display" class="text-xs text-gray-400"></span>
            </div>
            <button id="logout-btn" class="text-sm bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded transition hidden">Выйти</button>
        </div>

        <div class="p-3 border-b border-gray-700">
            <form id="add-chat-form" class="flex space-x-2">
                <input type="text" id="new-chat-input" placeholder="Введите ник или ID друга" class="flex-1 bg-gray-700 text-sm text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="add-chat-btn" class="bg-blue-600 hover:bg-blue-700 text-sm px-4 py-2 rounded transition flex items-center">
                    <span>+ Добавить</span>
                    <svg class="hidden animate-spin ml-2 h-4 w-4 text-white" id="add-chat-spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <div id="chat-list-container" class="flex-1 overflow-y-auto scrollbar-hidden p-2">
            <div id="chat-list" class="space-y-1">
                <div class="text-center text-gray-500 py-10">
                    <svg class="animate-spin h-5 w-5 mx-auto mb-2 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Загрузка чатов...
                </div>
            </div>
        </div>
    </div>

    <!-- Область чата -->
    <div id="chat-area" class="w-2/3 flex flex-col bg-gray-800">
        <div id="no-chat-selected" class="flex-1 flex items-center justify-center text-gray-500">
            <p>Выберите чат или добавьте друга</p>
        </div>

        <div id="active-chat-view" class="flex-1 flex flex-col h-full hidden">
            <div class="p-4 bg-gray-800 border-b border-gray-700 flex items-center">
                <div>
                    <h3 id="active-chat-name" class="font-bold text-lg"></h3>
                    <span id="active-chat-id-display" class="text-xs text-gray-400"></span>
                </div>
            </div>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center text-gray-500 py-10">
                    <svg class="animate-spin h-5 w-5 mx-auto mb-2 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Загрузка сообщений...
                </div>
            </div>

            <div class="p-4 bg-gray-800 border-t border-gray-700">
                <form id="send-message-form" class="flex space-x-2">
                    <input type="text" id="message-input" placeholder="Введите сообщение..." class="flex-1 bg-gray-700 text-white px-4 py-3 rounded-full border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" autocomplete="off" disabled>
                    <button type="submit" id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-full transition disabled:opacity-50" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно аутентификации -->
<div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
    <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-md p-6">
        <h2 id="auth-modal-title" class="text-2xl font-bold mb-6 text-center">Загрузка...</h2>
        <div id="auth-error" class="mb-4 bg-red-900/50 border border-red-700 rounded p-3 text-sm overflow-auto max-h-40 hidden"></div>
        <form id="auth-form" class="space-y-4 hidden">
            <div>
                <label for="auth-nickname" class="block text-sm font-medium text-gray-300 mb-1">Никнейм</label>
                <input type="text" id="auth-nickname" name="nickname" required minlength="3" maxlength="20" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="auth-password" class="block text-sm font-medium text-gray-300 mb-1">Пароль</label>
                <input type="password" id="auth-password" name="password" required minlength="6" class="w-full bg-gray-700 text-white px-3 py-2 rounded border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex justify-between items-center pt-2">
                <button type="button" id="switch-auth-mode" class="text-blue-400 hover:text-blue-300 text-sm">↻ Войти</button>
                <button type="submit" id="auth-submit-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded transition">Зарегистрироваться</button>
            </div>
        </form>
        <div id="auth-loading" class="text-center py-8">
            <svg class="animate-spin h-8 w-8 mx-auto text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-2 text-gray-300">Проверка сессии...</p>
        </div>
    </div>
</div>

<!-- Дебаг-консоль (оставлена для диагностики) -->
<div id="debug-console" class="fixed bottom-0 left-0 right-0 bg-black bg-opacity-80 text-green-400 p-2 text-xs font-mono h-32 overflow-y-auto border-t border-gray-700" style="display: none;">
    <div class="flex justify-between items-center mb-1">
        <span class="font-bold">🐞 Debug Console</span>
        <button id="clear-debug-btn" class="text-gray-400 hover:text-white px-2 py-0.5 text-xs bg-gray-700 rounded">Clear</button>
    </div>
    <div id="debug-content"></div>
</div>

<script>
    (function(){
        // --- КОНФИГУРАЦИЯ ---
        const SUPABASE_URL = 'https://my-proxy-chat.wodaphone1337.workers.dev';
        const SUPABASE_ANON_KEY = 'sb_publishable_MP_XcGnCETIZB-2p6S4gHw_9L4PQCw0';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // --- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ---
        let currentUser = null;
        let currentProfile = null;
        let activeChat = null;
        let chatsList = [];
        let messageSubscription = null;
        let isLoginMode = false;
        
        // --- DOM ЭЛЕМЕНТЫ ---
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const authErrorDiv = document.getElementById('auth-error');
        const authTitle = document.getElementById('auth-modal-title');
        const switchAuthBtn = document.getElementById('switch-auth-mode');
        const submitBtn = document.getElementById('auth-submit-btn');
        const nicknameInput = document.getElementById('auth-nickname');
        const passwordInput = document.getElementById('auth-password');
        const authLoadingDiv = document.getElementById('auth-loading');
        const appDiv = document.getElementById('app');
        const logoutBtn = document.getElementById('logout-btn');
        const userNicknameDisplay = document.getElementById('user-nickname-display');
        const userIdDisplay = document.getElementById('user-id-display');
        const chatListDiv = document.getElementById('chat-list');
        const noChatSelectedDiv = document.getElementById('no-chat-selected');
        const activeChatView = document.getElementById('active-chat-view');
        const activeChatName = document.getElementById('active-chat-name');
        const activeChatIdDisplay = document.getElementById('active-chat-id-display');
        const messagesContainer = document.getElementById('messages-container');
        const sendMessageForm = document.getElementById('send-message-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const addChatForm = document.getElementById('add-chat-form');
        const newChatInput = document.getElementById('new-chat-input');
        const addChatBtn = document.getElementById('add-chat-btn');
        const addChatSpinner = document.getElementById('add-chat-spinner');
        const globalLoader = document.getElementById('global-loader');
        
        // Дебаг-консоль
        const debugConsole = document.getElementById('debug-console');
        const debugContent = document.getElementById('debug-content');
        const clearDebugBtn = document.getElementById('clear-debug-btn');
        
        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function showGlobalLoader(show = true) {
            if (show) globalLoader.classList.remove('hidden');
            else globalLoader.classList.add('hidden');
        }
        
        function logToDebug(message, type = 'info') {
            console.log(message);
            if (!debugContent) return;
            const entry = document.createElement('div');
            entry.className = `mb-1 ${type === 'error' ? 'text-red-400' : 'text-green-400'}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugContent.appendChild(entry);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            if (debugContent.children.length > 50) debugContent.removeChild(debugContent.children[0]);
        }
        
        function displayError(context, error) {
            const msg = error?.message || error?.error_description || JSON.stringify(error);
            authErrorDiv.textContent = `${context}: ${msg}`;
            authErrorDiv.classList.remove('hidden');
            logToDebug(`ERROR ${context}: ${msg}`, 'error');
        }
        
        function clearAuthError() {
            authErrorDiv.textContent = '';
            authErrorDiv.classList.add('hidden');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // --- АУТЕНТИФИКАЦИЯ ---
        async function checkSession() {
            authTitle.textContent = 'Загрузка...';
            authLoadingDiv.classList.remove('hidden');
            authForm.classList.add('hidden');
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) throw error;
                if (session?.user) {
                    currentUser = session.user;
                    await loadProfile(currentUser.id);
                    showApp();
                } else {
                    showAuthForm();
                }
            } catch (e) {
                displayError('Ошибка сессии', e);
                showAuthForm();
            }
        }
        
        async function loadProfile(userId) {
            const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
            if (error) throw error;
            currentProfile = data;
            userNicknameDisplay.textContent = currentProfile.nickname;
            userIdDisplay.textContent = `ID: ${currentProfile.id}`;
        }
        
        function showAuthForm() {
            authLoadingDiv.classList.add('hidden');
            authForm.classList.remove('hidden');
            authTitle.textContent = isLoginMode ? 'Вход' : 'Регистрация';
            submitBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            switchAuthBtn.textContent = isLoginMode ? '↻ Регистрация' : '↻ Войти';
            clearAuthError();
        }
        
        function showApp() {
            authModal.classList.add('hidden');
            appDiv.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            loadChats();
        }
        
        switchAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            showAuthForm();
        });
        
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAuthError();
            const nickname = nicknameInput.value.trim();
            const password = passwordInput.value;
            if (!nickname || !password) {
                displayError('Ошибка', 'Введите никнейм и пароль');
                return;
            }
            
            showGlobalLoader(true);
            try {
                if (isLoginMode) {
                    const { data: profile } = await supabase.from('profiles').select('id').eq('nickname', nickname).single();
                    if (!profile) throw new Error('Пользователь не найден');
                    const email = `${nickname}@temp.mail`;
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                    await loadProfile(currentUser.id);
                    showApp();
                } else {
                    const email = `${nickname}@temp.mail`;
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: { data: { nickname } }
                    });
                    if (error) throw error;
                    await new Promise(resolve => setTimeout(resolve, 500));
                    const { error: loginError } = await supabase.auth.signInWithPassword({ email, password });
                    if (loginError) throw loginError;
                    currentUser = data.user;
                    await loadProfile(data.user.id);
                    showApp();
                }
            } catch (e) {
                displayError('Ошибка', e);
            } finally {
                showGlobalLoader(false);
            }
        });
        
        logoutBtn.addEventListener('click', async () => {
            showGlobalLoader(true);
            await supabase.auth.signOut();
            currentUser = null;
            activeChat = null;
            if (messageSubscription) messageSubscription.unsubscribe();
            showAuthForm();
            authModal.classList.remove('hidden');
            appDiv.classList.add('hidden');
            showGlobalLoader(false);
        });
        
        // --- ЧАТЫ ---
        async function loadChats() {
            chatListDiv.innerHTML = `<div class="text-center text-gray-500 py-10"><svg class="animate-spin h-5 w-5 mx-auto mb-2 text-blue-500" ...></svg>Загрузка чатов...</div>`;
            try {
                const { data, error } = await supabase
                    .from('chats')
                    .select(`id, user1_id, user2_id, created_at, user1:profiles!chats_user1_id_fkey(nickname), user2:profiles!chats_user2_id_fkey(nickname)`)
                    .or(`user1_id.eq.${currentUser.id},user2_id.eq.${currentUser.id}`)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                chatsList = data || [];
                renderChatList();
            } catch (e) {
                displayError('Ошибка загрузки чатов', e);
                chatListDiv.innerHTML = '<div class="text-center text-red-400 py-10">Ошибка загрузки</div>';
            }
        }
        
        function renderChatList() {
            if (chatsList.length === 0) {
                chatListDiv.innerHTML = '<div class="text-center text-gray-500 py-10">Нет чатов. Добавьте друга</div>';
                return;
            }
            let html = '';
            chatsList.forEach(chat => {
                const other = chat.user1_id === currentUser.id ? chat.user2 : chat.user1;
                html += `<div class="chat-item p-3 rounded-lg cursor-pointer transition ${activeChat?.id === chat.id ? 'bg-blue-700' : 'bg-gray-750 hover:bg-gray-700'}" data-chat-id="${chat.id}" data-other-id="${other.id}" data-other-nickname="${other.nickname}"><div class="font-medium">${other.nickname}</div><div class="text-xs text-gray-400">ID: ${chat.id}</div></div>`;
            });
            chatListDiv.innerHTML = html;
            document.querySelectorAll('.chat-item').forEach(el => el.addEventListener('click', () => selectChat(parseInt(el.dataset.chatId), el.dataset.otherId, el.dataset.otherNickname)));
        }
        
        async function createChat(target) {
            addChatBtn.disabled = true;
            addChatSpinner.classList.remove('hidden');
            try {
                let profile;
                if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(target)) {
                    const { data } = await supabase.from('profiles').select('*').eq('id', target).single();
                    profile = data;
                } else {
                    const { data } = await supabase.from('profiles').select('*').eq('nickname', target).single();
                    profile = data;
                }
                if (!profile) throw new Error('Пользователь не найден');
                if (profile.id === currentUser.id) throw new Error('Нельзя создать чат с собой');
                
                const u1 = currentUser.id < profile.id ? currentUser.id : profile.id;
                const u2 = currentUser.id < profile.id ? profile.id : currentUser.id;
                const { data: existing } = await supabase.from('chats').select('id').eq('user1_id', u1).eq('user2_id', u2).maybeSingle();
                if (existing) {
                    await loadChats();
                    selectChat(existing.id, profile.id, profile.nickname);
                } else {
                    const { data: newChat } = await supabase.from('chats').insert({ user1_id: u1, user2_id: u2 }).select().single();
                    await loadChats();
                    selectChat(newChat.id, profile.id, profile.nickname);
                }
                newChatInput.value = '';
            } catch (e) {
                displayError('Ошибка создания чата', e);
            } finally {
                addChatBtn.disabled = false;
                addChatSpinner.classList.add('hidden');
            }
        }
        
        addChatForm.addEventListener('submit', (e) => { e.preventDefault(); if (newChatInput.value.trim()) createChat(newChatInput.value.trim()); });
        
        // --- СООБЩЕНИЯ ---
        async function selectChat(chatId, otherId, otherNickname) {
            activeChat = { id: chatId, otherUserId: otherId, otherUserNickname: otherNickname };
            activeChatName.textContent = otherNickname;
            activeChatIdDisplay.textContent = `Chat ID: ${chatId}`;
            noChatSelectedDiv.classList.add('hidden');
            activeChatView.classList.remove('hidden');
            messageInput.disabled = false;
            sendBtn.disabled = false;
            renderChatList();
            
            messagesContainer.innerHTML = `<div class="text-center text-gray-500 py-10"><svg class="animate-spin h-5 w-5 mx-auto mb-2 text-blue-500" ...></svg>Загрузка сообщений...</div>`;
            
            await loadMessages(chatId);
            subscribeToMessages(chatId);
            messageInput.focus();
        }
        
        async function loadMessages(chatId) {
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select(`id, content, created_at, sender_id, sender:profiles!messages_sender_id_fkey(nickname)`)
                    .eq('chat_id', chatId)
                    .order('created_at', { ascending: true });
                if (error) throw error;
                renderMessages(data);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (e) {
                displayError('Ошибка загрузки сообщений', e);
                messagesContainer.innerHTML = '<div class="text-center text-red-400 py-10">Ошибка загрузки</div>';
            }
        }
        
        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div class="text-center text-gray-500 py-10">Нет сообщений. Напишите первое</div>';
                return;
            }
            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.sender_id === currentUser.id;
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                html += `<div class="flex ${isOwn ? 'justify-end' : 'justify-start'}"><div class="max-w-[75%]"><div class="text-xs text-gray-400 mb-1 ${isOwn ? 'text-right' : ''}">${msg.sender.nickname} • ${time}</div><div class="rounded-2xl px-4 py-2 ${isOwn ? 'bg-blue-600' : 'bg-gray-700'}">${escapeHtml(msg.content)}</div></div></div>`;
            });
            messagesContainer.innerHTML = html;
        }
        
        function subscribeToMessages(chatId) {
            if (messageSubscription) messageSubscription.unsubscribe();
            messageSubscription = supabase
                .channel(`chat-${chatId}`)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, (payload) => {
                    logToDebug(`Новое сообщение в чате ${chatId}`);
                    loadMessages(chatId);
                })
                .subscribe((status) => { if (status === 'SUBSCRIBED') logToDebug('Realtime подписка активна'); });
        }
        
        sendMessageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!activeChat || !messageInput.value.trim()) return;
            const content = messageInput.value.trim();
            messageInput.value = '';
            try {
                await supabase.from('messages').insert({ chat_id: activeChat.id, sender_id: currentUser.id, content });
                // Realtime обновит через подписку
            } catch (e) {
                displayError('Ошибка отправки', e);
            }
        });
        
        // --- ИНИЦИАЛИЗАЦИЯ ---
        checkSession();
        debugConsole.style.display = 'block';
        clearDebugBtn.addEventListener('click', () => debugContent.innerHTML = '');
        window.debug = { supabase, logToDebug };
    })();
</script>
</body>
</html>
