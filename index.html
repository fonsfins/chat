<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat – Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@7.1.1/build/umd.js"></script>
    <style>
        .scrollbar-hidden::-webkit-scrollbar { display: none; }
        .scrollbar-hidden { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .debug-minimized { height: 28px !important; overflow: hidden !important; }
        .media-preview { max-width: 100%; border-radius: 0.5rem; margin-top: 0.5rem; }
        video, audio { max-width: 100%; border-radius: 0.5rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

<!-- Глобальный лоадер -->
<div id="global-loader" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-800 rounded-lg p-6 flex items-center space-x-3">
        <svg class="animate-spin h-6 w-6 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span id="global-loader-text">Загрузка...</span>
    </div>
</div>

<!-- Основной интерфейс -->
<div id="app" class="flex h-screen max-w-6xl mx-auto bg-gray-800 shadow-2xl overflow-hidden">
    <!-- Сайдбар (без изменений) -->
    <div id="sidebar" class="w-1/3 bg-gray-850 border-r border-gray-700 flex flex-col">
        <!-- ... (весь код сайдбара из предыдущей версии) ... -->
    </div>

    <!-- Область чата -->
    <div id="chat-area" class="w-2/3 flex flex-col bg-gray-800">
        <!-- ... (весь код области чата из предыдущей версии) ... -->
    </div>
</div>

<!-- Модальное окно аутентификации (без изменений) -->
<!-- ... -->

<!-- Дебаг-консоль -->
<div id="debug-console" class="fixed bottom-4 right-4 w-96 bg-black bg-opacity-95 text-green-400 text-xs font-mono rounded-lg border border-gray-700 shadow-xl transition-all duration-200 z-50" style="max-height: 300px;">
    <div class="flex justify-between items-center p-2 bg-gray-800 rounded-t-lg cursor-pointer" id="debug-header">
        <span class="font-bold">🐞 Debug Console</span>
        <div class="flex space-x-1">
            <button id="clear-debug-btn" class="text-gray-400 hover:text-white px-2 py-0.5 text-xs bg-gray-700 rounded">Clear</button>
            <button id="toggle-debug-btn" class="text-gray-400 hover:text-white px-2 py-0.5 text-xs bg-gray-700 rounded">_</button>
        </div>
    </div>
    <div id="debug-content" class="p-2 overflow-y-auto" style="max-height: 250px;"></div>
</div>

<script>
    (function(){
        const SUPABASE_URL = 'https://visizgpiszvmetydldeo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_MP_XcGnCETIZB-2p6S4gHw_9L4PQCw0';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        let activeChat = null;
        let chatsList = [];
        let realtimeChannel = null;
        let isLoginMode = false;
        let db;
        
        // DOM элементы (как раньше)
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const authErrorDiv = document.getElementById('auth-error');
        const authTitle = document.getElementById('auth-modal-title');
        const switchAuthBtn = document.getElementById('switch-auth-mode');
        const submitBtn = document.getElementById('auth-submit-btn');
        const nicknameInput = document.getElementById('auth-nickname');
        const passwordInput = document.getElementById('auth-password');
        const authLoadingDiv = document.getElementById('auth-loading');
        const appDiv = document.getElementById('app');
        const logoutBtn = document.getElementById('logout-btn');
        const userNicknameDisplay = document.getElementById('user-nickname-display');
        const userIdDisplay = document.getElementById('user-id-display');
        const chatListDiv = document.getElementById('chat-list');
        const noChatSelectedDiv = document.getElementById('no-chat-selected');
        const activeChatView = document.getElementById('active-chat-view');
        const activeChatName = document.getElementById('active-chat-name');
        const activeChatIdDisplay = document.getElementById('active-chat-id-display');
        const messagesContainer = document.getElementById('messages-container');
        const sendMessageForm = document.getElementById('send-message-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const addChatForm = document.getElementById('add-chat-form');
        const newChatInput = document.getElementById('new-chat-input');
        const addChatBtn = document.getElementById('add-chat-btn');
        const addChatSpinner = document.getElementById('add-chat-spinner');
        const globalLoader = document.getElementById('global-loader');
        const globalLoaderText = document.getElementById('global-loader-text');
        const fileUpload = document.getElementById('file-upload');
        const uploadStatus = document.getElementById('upload-status');
        
        const debugConsoleDiv = document.getElementById('debug-console');
        const debugContent = document.getElementById('debug-content');
        const clearDebugBtn = document.getElementById('clear-debug-btn');
        const toggleDebugBtn = document.getElementById('toggle-debug-btn');
        let debugMinimized = false;
        
        // Инициализация IndexedDB
        async function initDB() {
            db = await idb.openDB('chat-cache', 1, {
                upgrade(db) {
                    db.createObjectStore('files');
                },
            });
            log('IndexedDB инициализирована');
        }
        initDB();
        
        // Логирование
        function log(msg, type='info') {
            console.log(msg);
            if (!debugContent) return;
            const entry = document.createElement('div');
            entry.className = `mb-1 ${type==='error'?'text-red-400':type==='warn'?'text-yellow-400':'text-green-400'}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugContent.appendChild(entry);
            if (!debugMinimized) debugContent.scrollTop = debugContent.scrollHeight;
            while (debugContent.children.length > 100) debugContent.removeChild(debugContent.children[0]);
        }
        
        function errorLog(msg) { log(msg, 'error'); }
        function warnLog(msg) { log(msg, 'warn'); }
        
        function showGlobalLoader(show=true, text='Загрузка...') {
            globalLoaderText.textContent = text;
            globalLoader.classList.toggle('hidden', !show);
        }
        
        function displayError(context, error) {
            const msg = error?.message || JSON.stringify(error);
            authErrorDiv.textContent = `${context}: ${msg}`;
            authErrorDiv.classList.remove('hidden');
            errorLog(`ERROR ${context}: ${msg}`);
        }
        
        function clearAuthError() {
            authErrorDiv.textContent = '';
            authErrorDiv.classList.add('hidden');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function cacheFile(storagePath, blob) {
            if (!db) await initDB();
            await db.put('files', blob, storagePath);
        }
        
        async function getCachedFile(storagePath) {
            if (!db) await initDB();
            return await db.get('files', storagePath);
        }
        
        // Генерация подписанного URL для приватного бакета
        async function getSignedUrl(storagePath) {
            const { data, error } = await supabase.storage
                .from('chat-files')
                .createSignedUrl(storagePath, 3600); // 1 час
            if (error) throw error;
            return data.signedUrl;
        }
        
        // Аутентификация (как раньше)
        // ... (весь код аутентификации без изменений) ...
        
        // Чаты (как раньше)
        // ... (весь код чатов без изменений) ...
        
        // Сообщения и Realtime
        async function selectChat(chatId, otherId, otherNickname) {
            log(`Выбран чат ${chatId} с ${otherNickname}`);
            
            if (realtimeChannel) {
                supabase.removeChannel(realtimeChannel);
                realtimeChannel = null;
            }
            
            activeChat = { id: chatId, otherUserId: otherId, otherUserNickname: otherNickname };
            activeChatName.textContent = otherNickname;
            activeChatIdDisplay.textContent = `Chat ID: ${chatId}`;
            noChatSelectedDiv.classList.add('hidden');
            activeChatView.classList.remove('hidden');
            messageInput.disabled = false;
            sendBtn.disabled = false;
            renderChatList();
            
            await loadMessages(chatId);
            setupRealtime(chatId);
            messageInput.focus();
        }
        
        async function loadMessages(chatId) {
            messagesContainer.innerHTML = '<div class="text-center text-gray-500 py-10">Загрузка сообщений...</div>';
            try {
                const [messagesRes, filesRes] = await Promise.all([
                    supabase.from('messages').select(`id, content, created_at, sender_id, sender:profiles!messages_sender_id_fkey(nickname)`).eq('chat_id', chatId).order('created_at', { ascending: true }),
                    supabase.from('files').select('*').eq('chat_id', chatId).order('created_at', { ascending: true })
                ]);
                if (messagesRes.error) throw messagesRes.error;
                if (filesRes.error) throw filesRes.error;
                
                const messages = messagesRes.data || [];
                const files = filesRes.data || [];
                
                log(`Загружено ${messages.length} сообщений и ${files.length} файлов`);
                renderAllMessages(messages, files);
            } catch (e) {
                errorLog('Ошибка загрузки: ' + e.message);
                messagesContainer.innerHTML = '<div class="text-center text-red-400 py-10">Ошибка загрузки</div>';
            }
        }
        
        async function renderAllMessages(messages, files) {
            messagesContainer.innerHTML = '';
            const items = [
                ...messages.map(m => ({ ...m, type: 'message' })),
                ...files.map(f => ({ ...f, type: 'file', created_at: f.created_at }))
            ].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            
            if (items.length === 0) {
                messagesContainer.innerHTML = '<div class="text-center text-gray-500 py-10">Нет сообщений</div>';
                return;
            }
            
            for (const item of items) {
                if (item.type === 'message') {
                    appendMessageElement(item);
                } else {
                    await appendFileElement(item);
                }
            }
            scrollToBottom();
        }
        
        function appendMessageElement(msg) {
            const isOwn = msg.sender_id === currentUser.id;
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `flex ${isOwn ? 'justify-end' : 'justify-start'}`;
            div.dataset.messageId = msg.id;
            div.innerHTML = `<div class="max-w-[75%]">
                <div class="text-xs text-gray-400 mb-1 ${isOwn ? 'text-right' : ''}">${msg.sender.nickname} • ${time}</div>
                <div class="rounded-2xl px-4 py-2 ${isOwn ? 'bg-blue-600' : 'bg-gray-700'} break-words">${escapeHtml(msg.content)}</div>
            </div>`;
            messagesContainer.appendChild(div);
        }
        
        async function appendFileElement(file) {
            const isOwn = file.uploaded_by === currentUser.id;
            const time = new Date(file.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = `flex ${isOwn ? 'justify-end' : 'justify-start'}`;
            div.dataset.fileId = file.id;
            
            let mediaHtml = '';
            try {
                // Получаем подписанный URL
                const signedUrl = await getSignedUrl(file.storage_path);
                
                if (file.is_image) {
                    mediaHtml = `<img src="${signedUrl}" alt="${file.filename}" class="media-preview" style="max-height: 300px;" loading="lazy" onclick="window.open('${signedUrl}', '_blank')">`;
                } else if (file.mime_type?.startsWith('video/')) {
                    mediaHtml = `<video controls class="media-preview" style="max-height: 300px;"><source src="${signedUrl}" type="${file.mime_type}"></video>`;
                } else if (file.mime_type?.startsWith('audio/')) {
                    mediaHtml = `<audio controls class="media-preview"><source src="${signedUrl}" type="${file.mime_type}"></audio>`;
                } else {
                    mediaHtml = `<div class="bg-gray-800 rounded-lg p-3 border border-gray-700 flex items-center space-x-3">
                        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <div class="flex-1"><div class="font-medium">${file.filename}</div><div class="text-xs text-gray-400">${(file.size/1024).toFixed(0)}KB</div></div>
                        <button onclick="window.downloadFile('${file.storage_path}', '${file.filename}')" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm">Скачать</button>
                    </div>`;
                }
            } catch(e) {
                errorLog('Ошибка получения подписанного URL: ' + e.message);
                mediaHtml = `<div class="text-red-400">Ошибка загрузки файла</div>`;
            }
            
            div.innerHTML = `<div class="max-w-[75%]">
                <div class="text-xs text-gray-400 mb-1 ${isOwn ? 'text-right' : ''}">${isOwn ? 'Вы' : activeChat.otherUserNickname} • ${time}</div>
                <div class="rounded-2xl px-4 py-2 ${isOwn ? 'bg-blue-600' : 'bg-gray-700'}">
                    ${mediaHtml}
                    <div class="text-xs text-gray-300 mt-1">${file.filename}</div>
                </div>
            </div>`;
            messagesContainer.appendChild(div);
        }
        
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        window.downloadFile = async function(storagePath, filename) {
            log(`Скачивание: ${filename}`);
            try {
                let blob = await getCachedFile(storagePath);
                if (!blob) {
                    const signedUrl = await getSignedUrl(storagePath);
                    const response = await fetch(signedUrl);
                    if (!response.ok) throw new Error('Ошибка загрузки');
                    blob = await response.blob();
                    await cacheFile(storagePath, blob);
                }
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                errorLog('Ошибка скачивания: ' + e.message);
                alert('Не удалось скачать файл');
            }
        };
        
        function setupRealtime(chatId) {
            log(`Настройка Realtime для чата ${chatId}`);
            
            realtimeChannel = supabase
                .channel(`chat-${chatId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `chat_id=eq.${chatId}`
                }, async (payload) => {
                    log(`Realtime: новое сообщение в чате ${chatId}`);
                    const newMsg = payload.new;
                    // Получаем никнейм отправителя
                    const { data: sender } = await supabase
                        .from('profiles')
                        .select('nickname')
                        .eq('id', newMsg.sender_id)
                        .single();
                    newMsg.sender = sender;
                    appendMessageElement(newMsg);
                    scrollToBottom();
                })
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'files',
                    filter: `chat_id=eq.${chatId}`
                }, async (payload) => {
                    log(`Realtime: новый файл в чате ${chatId}`);
                    await appendFileElement(payload.new);
                    scrollToBottom();
                })
                .subscribe((status, err) => {
                    if (status === 'SUBSCRIBED') {
                        log('✅ Realtime подписка активна');
                    } else if (status === 'CHANNEL_ERROR') {
                        errorLog(`❌ Ошибка Realtime: ${err?.message || 'неизвестно'}`);
                    } else if (status === 'TIMED_OUT') {
                        errorLog('⏱️ Таймаут Realtime');
                    } else if (status === 'CLOSED') {
                        warnLog('Realtime канал закрыт');
                    }
                });
        }
        
        sendMessageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!activeChat || !messageInput.value.trim()) return;
            const content = messageInput.value.trim();
            messageInput.value = '';
            
            try {
                const { error } = await supabase.from('messages').insert({
                    chat_id: activeChat.id,
                    sender_id: currentUser.id,
                    content
                });
                if (error) throw error;
                log('Сообщение отправлено');
                // Не добавляем оптимистично — Realtime сам добавит
            } catch (e) {
                errorLog('Ошибка отправки: ' + e.message);
            }
        });
        
        // Загрузка файлов
        fileUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            uploadStatus.classList.remove('hidden');
            uploadStatus.textContent = `Загрузка ${file.name}...`;
            
            try {
                if (file.size > 100*1024*1024) throw new Error('Файл > 100MB');
                
                let processedFile = file;
                if (file.type.startsWith('image/')) {
                    try {
                        const options = { maxSizeMB: 1, maxWidthOrHeight: 1920, useWebWorker: true };
                        processedFile = await imageCompression(file, options);
                        log(`Сжато: ${(file.size/1024).toFixed(0)}KB -> ${(processedFile.size/1024).toFixed(0)}KB`);
                    } catch(e) { warnLog('Сжатие не удалось: '+e.message); }
                }
                
                const timestamp = Date.now();
                const safeName = `${currentUser.id}_${timestamp}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                const storagePath = `${activeChat.id}/${safeName}`;
                
                const { error: uploadError } = await supabase.storage.from('chat-files').upload(storagePath, processedFile);
                if (uploadError) throw uploadError;
                
                await cacheFile(storagePath, processedFile);
                
                const { data: fileData, error: dbError } = await supabase.from('files').insert({
                    chat_id: activeChat.id,
                    uploaded_by: currentUser.id,
                    storage_path: storagePath,
                    filename: file.name,
                    size: processedFile.size,
                    mime_type: processedFile.type,
                    is_image: processedFile.type.startsWith('image/')
                }).select().single();
                if (dbError) throw dbError;
                
                uploadStatus.textContent = 'Файл отправлен!';
                setTimeout(() => uploadStatus.classList.add('hidden'), 2000);
            } catch (e) {
                errorLog('Ошибка загрузки: ' + e.message);
                uploadStatus.textContent = 'Ошибка загрузки';
                setTimeout(() => uploadStatus.classList.add('hidden'), 3000);
            } finally {
                fileUpload.value = '';
            }
        });
        
        // Дебаг-консоль
        clearDebugBtn.addEventListener('click', () => debugContent.innerHTML = '');
        toggleDebugBtn.addEventListener('click', () => {
            debugMinimized = !debugMinimized;
            debugConsoleDiv.classList.toggle('debug-minimized', debugMinimized);
            toggleDebugBtn.textContent = debugMinimized ? '□' : '_';
        });
        document.getElementById('debug-header').addEventListener('click', () => {
            debugMinimized = !debugMinimized;
            debugConsoleDiv.classList.toggle('debug-minimized', debugMinimized);
            toggleDebugBtn.textContent = debugMinimized ? '□' : '_';
        });
        
        // Тест WebSocket (информационный)
        (function testWebSocket() {
            log('Тестируем WebSocket соединение...');
            const wsUrl = `${SUPABASE_URL}/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}`.replace('http', 'ws');
            log(`Попытка подключения к: ${wsUrl}`);
            const testWs = new WebSocket(wsUrl);
            testWs.onopen = () => {
                log('✅ WebSocket тест: соединение установлено успешно');
                testWs.close();
            };
            testWs.onerror = () => {
                errorLog('❌ WebSocket тест: ошибка соединения');
            };
        })();
        
        // Запуск
        checkSession();
        log('Приложение готово. Используется URL: ' + SUPABASE_URL);
    })();
</script>
</body>
</html>
